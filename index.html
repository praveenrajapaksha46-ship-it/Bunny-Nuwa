<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 My Fan Hub</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: black;
}

/* Particle canvas */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* Glass card */
.container {
    margin: 50px auto;
    padding: 25px;
    width: 90%;
    max-width: 420px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 30px rgba(0,255,255,0.3);
    animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Profile */
.profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid cyan;
    box-shadow: 0 0 25px cyan;
    object-fit: cover;
}

/* Buttons */
.btn {
    display: block;
    margin: 12px auto;
    padding: 14px;
    width: 85%;
    border-radius: 30px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* Neon effects */
.call {
    background: #00ff99;
    color: black;
}
.call:hover {
    box-shadow: 0 0 20px #00ff99;
    transform: scale(1.05);
}

.tiktok {
    background: black;
    border: 1px solid cyan;
}
.tiktok:hover {
    box-shadow: 0 0 20px cyan;
    transform: scale(1.05);
}

/* Clock */
#clock {
    margin: 10px;
    font-size: 18px;
    color: cyan;
}

/* Counter */
#counter {
    font-size: 14px;
    opacity: 0.8;
}

/* TikTok embed */
iframe {
    margin-top: 15px;
    border-radius: 10px;
}

/* Audio */
audio {
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <img src="images/ch.jpeg" class="profile-img">

    <h2>🔥 My Fan Hub 🔥</h2>

    <div id="clock"></div>
    <div id="counter"></div>

    <!-- Call -->
    <a href="tel:0755101419" class="btn call">📞 Call Me</a>

    <!-- TikTok -->
    <a href="https://www.tiktok.com/@nuwa_page" target="_blank" class="btn tiktok">
        🎵 @nuwa_page
    </a>

    <a href="https://www.tiktok.com/@bunny_quotess" target="_blank" class="btn tiktok">
        🎵 @bunny_quotess
    </a>

    <!-- TikTok Videos -->
    <iframe src="https://www.tiktok.com/embed/your-video-id" width="100%" height="300"></iframe>

    <!-- Music -->
    <audio controls>
        <source src="audio/Hope-Emotional-Soundtrack(chosic.com).mp3" type="audio/mpeg">
    </audio>

</div>

<script>
/* CLOCK */
function updateClock() {
    let now = new Date();
    document.getElementById("clock").innerHTML =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);

/* VISITOR COUNTER */
let count = localStorage.getItem("visits") || 0;
count++;
localStorage.setItem("visits", count);
document.getElementById("counter").innerText =
    "👀 Visits: " + count;

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5),
        dy: (Math.random() - 0.5)
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "cyan";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x<0||p.x>canvas.width) p.dx *= -1;
        if(p.y<0||p.y>canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
